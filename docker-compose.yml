services:
  caddy:
    image: ghcr.io/edu-ls/chromebook-eol-dashboard-caddy:latest
    ports:
      - "8090:80"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy
    restart: unless-stopped
    depends_on:
      - api
      - frontend

  frontend:
    image: ghcr.io/edu-ls/chromebook-eol-dashboard-frontend:latest
    networks:
      - proxy
    restart: unless-stopped

  api:
    image: ghcr.io/edu-ls/chromebook-eol-dashboard-api:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/chromebook_eol
      SERVICE_ACCOUNT_B64: ${SERVICE_ACCOUNT_B64}
      SECRET_KEY: ${SECRET_KEY}
      AUTH_USERNAME: ${AUTH_USERNAME:-Eduthing}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
    networks:
      - internal
      - proxy
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ghcr.io/edu-ls/chromebook-eol-dashboard-worker:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/chromebook_eol
      SERVICE_ACCOUNT_B64: ${SERVICE_ACCOUNT_B64}
      SYNC_HOUR: ${SYNC_HOUR:-2}
      SYNC_MINUTE: ${SYNC_MINUTE:-0}
      BACKUP_DIR: /backups
      BACKUP_RETAIN_COUNT: ${BACKUP_RETAIN_COUNT:-4}
    volumes:
      - db_backups:/backups
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chromebook_eol
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d chromebook_eol"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  db_backups:

networks:
  internal:
    driver: bridge
  proxy:
    driver: bridge
